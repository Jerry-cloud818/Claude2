<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <title>番茄时钟</title>
  <link rel="stylesheet" href="src/styles.css">
  <style>
    /* Mobile responsive overrides */
    @media (max-width: 480px) {
      .container { padding: 16px 12px; }
      .timer-wrapper { width: 170px; height: 170px; }
      .timer-time { font-size: 36px; }
      .stats-bar { gap: 20px; }
      .stat-value { font-size: 18px; }
      .controls { gap: 16px; }
      .btn-primary { width: 56px; height: 56px; }
      .btn-secondary { width: 40px; height: 40px; }
    }
    /* Remove titlebar in web version */
    body { padding-top: env(safe-area-inset-top, 0); }
    .container { height: 100vh; height: 100dvh; }
  </style>
</head>
<body data-theme="dark">
  <div class="container">
    <!-- Timer Display -->
    <div class="timer-wrapper">
      <svg class="timer-ring" viewBox="0 0 200 200">
        <circle class="timer-ring-bg" cx="100" cy="100" r="90" />
        <circle class="timer-ring-progress" id="timer-progress" cx="100" cy="100" r="90" />
      </svg>
      <div class="timer-display">
        <div class="timer-time" id="timer-time">25:00</div>
        <div class="timer-state" id="timer-state">准备开始</div>
      </div>
    </div>

    <!-- Pomodoro Counter -->
    <div class="pomodoro-dots" id="pomodoro-dots">
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
    </div>

    <!-- Controls -->
    <div class="controls">
      <button class="btn btn-secondary" id="btn-reset" title="重置">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
      </button>
      <button class="btn btn-primary" id="btn-start" title="开始">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
      </button>
      <button class="btn btn-secondary" id="btn-skip" title="下一个">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,4 15,12 5,20"/><rect x="19" y="4" width="2" height="16"/></svg>
      </button>
    </div>

    <!-- Stats Bar -->
    <div class="stats-bar">
      <div class="stat-item">
        <span class="stat-value" id="stat-today">0</span>
        <span class="stat-label">今日</span>
      </div>
      <div class="stat-item">
        <span class="stat-value" id="stat-week">0</span>
        <span class="stat-label">本周</span>
      </div>
      <div class="stat-item">
        <span class="stat-value" id="stat-total">0</span>
        <span class="stat-label">总计</span>
      </div>
    </div>

    <!-- Tab Navigation -->
    <div class="tabs">
      <button class="tab active" data-tab="tasks">任务</button>
      <button class="tab" data-tab="stats">统计</button>
      <button class="tab" data-tab="settings">设置</button>
    </div>

    <!-- Tasks Panel -->
    <div class="panel active" id="panel-tasks">
      <div class="task-input-wrapper">
        <input type="text" id="task-input" placeholder="添加新任务..." />
        <button class="btn-add" id="btn-add-task">+</button>
      </div>
      <div class="task-list" id="task-list"></div>
    </div>

    <!-- Stats Panel -->
    <div class="panel" id="panel-stats">
      <div class="chart-wrapper">
        <canvas id="stats-chart" width="350" height="180"></canvas>
      </div>
      <div class="stats-detail">
        <div class="stats-row"><span>今日完成</span><span id="detail-today">0 个番茄</span></div>
        <div class="stats-row"><span>本周完成</span><span id="detail-week">0 个番茄</span></div>
        <div class="stats-row"><span>本月完成</span><span id="detail-month">0 个番茄</span></div>
        <div class="stats-row"><span>累计完成</span><span id="detail-total">0 个番茄</span></div>
      </div>
    </div>

    <!-- Settings Panel -->
    <div class="panel" id="panel-settings">
      <div class="setting-group">
        <label>工作时长 (分钟)</label>
        <input type="number" id="setting-work" min="1" max="90" value="25" />
      </div>
      <div class="setting-group">
        <label>短休息 (分钟)</label>
        <input type="number" id="setting-short" min="1" max="30" value="5" />
      </div>
      <div class="setting-group">
        <label>长休息 (分钟)</label>
        <input type="number" id="setting-long" min="1" max="60" value="15" />
      </div>
      <div class="setting-group">
        <label>长休息间隔 (番茄数)</label>
        <input type="number" id="setting-interval" min="1" max="10" value="4" />
      </div>
      <div class="setting-toggle">
        <label>声音提醒</label>
        <input type="checkbox" id="setting-sound" checked />
      </div>
      <div class="setting-toggle">
        <label>深色主题</label>
        <input type="checkbox" id="setting-theme" checked />
      </div>
    </div>
  </div>

  <script src="src/timer.js"></script>
  <script src="src/tasks.js"></script>
  <script src="src/stats.js"></script>
  <script src="src/storage.js"></script>
  <script src="src/renderer.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</body>
</html>
